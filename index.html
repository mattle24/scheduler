<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Little League Scheduler</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚾</text></svg>">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>Little League Scheduler</h1>
<p class="subtitle">Generate a balanced game schedule from field availability</p>

<div class="card">
  <h2>Settings</h2>
  <div class="row" style="margin-bottom: 1rem;">
    <div>
      <label for="numTeams">Number of Teams</label>
      <input type="number" id="numTeams" min="2" max="30" value="">
    </div>
    <div>
      <label for="gamesPerTeam">Games per Team</label>
      <input type="number" id="gamesPerTeam" min="1" max="100" value="">
    </div>
    <div style="align-self: flex-end;">
      <button class="btn-secondary btn-sm" onclick="loadSample()">Load Sample Data</button>
    </div>
  </div>
  <label for="tsvInput">Field Availability (TSV — paste from spreadsheet or upload file)</label>
  <div class="file-upload-row">
    <input type="file" id="tsvFile" accept=".tsv,.csv,.txt,.xls,.xlsx" class="file-input">
    <label for="tsvFile" class="btn-secondary btn-sm file-label">Upload File</label>
    <span id="fileName" class="file-name"></span>
  </div>
  <textarea id="tsvInput" rows="8" placeholder="Date&#9;Field 1&#9;Field 2&#10;4/11/2026&#9;9:00am, 1:00pm&#9;10:00am&#10;4/12/2026&#9;10:00am&#9;..."></textarea>
  <div class="penalty-section">
    <div class="penalty-header" onclick="togglePenalties()">
      <span>&#9654;</span> Penalty Weights
    </div>
    <div id="penaltyWeights" class="penalty-body hidden">
      <p class="penalty-hint">Controls how much the optimizer cares about each rule. Higher = stronger priority. Set to 0 to ignore a rule.</p>
      <div class="penalty-grid">
        <label>Weekend Sit-outs (no games in a weekend)</label>
        <input type="number" id="w_weekendSitouts" min="0" max="50" value="12" step="1">
        <label>Weekday Back-to-Back</label>
        <input type="number" id="w_weekdayBackToBack" min="0" max="50" value="10" step="1">
        <label>Weekend Back-to-Back</label>
        <input type="number" id="w_weekendDoubleHeaders" min="0" max="50" value="8" step="1">
        <label>Fri/Sat or Sun/Mon Back-to-Back</label>
        <input type="number" id="w_crossBoundaryBTB" min="0" max="50" value="7" step="1">
        <label>Gap Variance (difference time between games across teams)</label>
        <input type="number" id="w_gapVariance" min="0" max="50" value="6" step="1">
        <label>5-Day Density (don't have too many games within 5 days)</label>
        <input type="number" id="w_rollingDensity" min="0" max="50" value="5" step="1">
        <label>6-Day Density (don't have too many games within 6 days)</label>
        <input type="number" id="w_sixDayDensity" min="0" max="50" value="5" step="1">
        <label>Short Gap Penalty</label>
        <input type="number" id="w_shortGapPenalty" min="0" max="50" value="3" step="1">
        <label>Time Distribution</label>
        <input type="number" id="w_timeDistribution" min="0" max="50" value="3" step="1">
        <label>Field Balance (teams play even games at each field)</label>
        <input type="number" id="w_fieldBalance" min="0" max="50" value="4" step="1">
      </div>
    </div>
  </div>
  <div class="actions">
    <button class="btn-primary" onclick="generate()">Generate Schedule</button>
  </div>
</div>

<div id="errorBox" class="error hidden"></div>
<div id="statusBox" class="status hidden"></div>

<div id="results" class="hidden">
  <div class="card">
    <h2>Constraint Scores</h2>
    <div id="scoreGrid" class="score-grid"></div>
  </div>

  <div class="card">
    <h2>Per-Team Summary</h2>
    <div id="teamSummary"></div>
  </div>

  <div class="card">
    <h2>Schedule</h2>
    <div id="scheduleTable"></div>
    <div class="actions">
      <button class="btn-secondary btn-sm" onclick="downloadCSV()">Download CSV</button>
    </div>
  </div>

  <div class="card">
    <h2>Team Heatmap</h2>
    <div id="heatmap" style="overflow-x:auto;"></div>
  </div>
</div>

<script src="scheduler.js"></script>
<script src="annealing.js"></script>
<script src="ui.js"></script>
</body>
</html>
